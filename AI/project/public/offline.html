<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1A3D2B" />
  <title>CropGuard — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F7F5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2rem 1.5rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #E8F5ED;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .icon svg { width: 32px; height: 32px; stroke: #1A3D2B; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.125rem; font-weight: 700; color: #1A3D2B; margin-bottom: .5rem; }
    p  { font-size: .875rem; color: #6B7C72; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: #1A3D2B;
      color: #fff;
      border: none;
      border-radius: .75rem;
      padding: .625rem 1.25rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:active { opacity: .85; }
    .badge {
      display: inline-block;
      margin-top: 1.25rem;
      background: #E8F5ED;
      color: #1A3D2B;
      font-size: .75rem;
      font-weight: 600;
      padding: .25rem .75rem;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24"><path d="M2 12a10 10 0 1 0 20 0"/><path d="M12 8v4l3 3"/><path d="M4.93 4.93 2 2"/></svg>
    </div>
    <h1>You're offline</h1>
    <p>CropGuard couldn't reach the network. Your locally cached data is still available — go back and continue working.</p>
    <button onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      Go back
    </button>
    <div class="badge">Offline mode active</div>
  </div>
</body>
</html>
